[global]
interval = "30s"

[global.labels]
from_agent = "catpaw"
from_hostname = "${HOSTNAME}"
from_hostip = "${IP}"

[log]
level = "info"
# format = "json"
# output = "stdout"
# fields = {}

## 控制台输出（新用户快速验证告警效果，无需任何外部服务）
[notify.console]
enabled = true

# [notify.flashduty]
# integration_key = "your-flashduty-integration-key"
# base_url = "https://api.flashcat.cloud/event/push/alert/standard"
# timeout = "10s"
# max_retries = 1

# [notify.pagerduty]
# routing_key = "your-pagerduty-routing-key"
# base_url = "https://events.pagerduty.com/v2/enqueue"
# timeout = "10s"
# max_retries = 1
