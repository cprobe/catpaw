[[partials]]
## ===== 最小可用示例（30 秒跑起来）=====
## 1) 在 instances.targets 里填 Redis 地址，支持 host 或 host:port
## 2) 如果 Redis 需要认证，填 password 或 username + password
## 3) 默认一定会做 connectivity
## 4) 如果目标是 Redis Cluster 节点，默认还会自动做两项低开销检查：
##    - redis::cluster_state：集群状态是否为 ok
##    - redis::cluster_topology：是否存在 fail/pfail 节点、slot 缺失
## 5) 其他阈值类检查（内存、连接数、QPS、复制角色等）默认关闭，按需开启
## 6) 高开销操作不会进入周期采集；大 key 等问题留给 diagnose / inspect 阶段处理
## 例子：
## targets = ["127.0.0.1", "10.0.0.8:6379"]
## password = "pa$$word"
## [instances.role]
## expect = "master"
## [instances.used_memory]
## warn_ge = "512MB"

id = "default"

## 每个 instance 并发探测数
# concurrency = 10

## 建连和写超时（默认 3s）
# timeout = "3s"

## 读超时（默认 2s）
# read_timeout = "2s"

## Redis ACL 用户名（Redis 6+）
# username = "default"

## Redis 密码
# password = "pa$$word"

## 选择数据库（默认 0）
# db = 0

## Redis 运行模式：
## - auto(默认)：自动探测 standalone / cluster
## - standalone：永不执行 cluster 检查，适合明确不是 Cluster 的实例
## - cluster：强制要求目标是 Redis Cluster 节点；若不是，会产出配置/运行错误事件
# mode = "auto"

## 可选：给同一 Redis Cluster 的多个节点打统一标签，方便在告警平台聚合查看
## 只影响事件 label，不参与连接
# cluster_name = "prod-cache"

## TLS 可选配置（原生 TLS / stunnel / 云 Redis）
# tls_ca = "/etc/catpaw/ca.pem"
# tls_cert = "/etc/catpaw/cert.pem"
# tls_key = "/etc/catpaw/key.pem"
# tls_server_name = "redis.example.com"
# insecure_skip_verify = false

## 连通性检测（默认启用，默认 Critical）
## check 标签固定为 "redis::connectivity"
[partials.connectivity]
severity = "Critical"

## 响应时间检测（warn_ge 和 critical_ge 都为 0 则关闭）
## check 标签固定为 "redis::response_time"
# [partials.response_time]
# warn_ge = "20ms"
# critical_ge = "100ms"

## 角色检测（expect 为空则关闭）
## 可选值：master / slave / replica
## check 标签固定为 "redis::role"
# [partials.role]
# expect = "master"
# severity = "Warning"

## 复制延迟检测（默认关闭）
## 指标单位是“字节偏移差”，不是时间
## - replica 节点：master_repl_offset - slave_repl_offset
## - master 节点：取所有 replica 中的最大 offset 差
## 这个阈值高度依赖业务写入速率，默认不建议开箱即用就开启
## check 标签固定为 "redis::repl_lag"
# [partials.repl_lag]
# warn_ge = "1MB"
# critical_ge = "10MB"

## 客户端连接数检测（两个阈值都为 0 则关闭）
## check 标签固定为 "redis::connected_clients"
# [partials.connected_clients]
# warn_ge = 500
# critical_ge = 1000

## 阻塞客户端数检测（两个阈值都为 0 则关闭）
## check 标签固定为 "redis::blocked_clients"
# [partials.blocked_clients]
# warn_ge = 1
# critical_ge = 5

## 内存使用量检测（两个阈值都为 0 则关闭）
## 支持 B / KB / MB / GB / TB
## check 标签固定为 "redis::used_memory"
# [partials.used_memory]
# warn_ge = "512MB"
# critical_ge = "1GB"

## maxmemory 使用百分比检测（默认关闭）
## 只有 Redis 配置了 maxmemory > 0 时才有意义
## 如果 maxmemory = 0（无限制），该检查会输出 Ok 并说明已跳过
## 百分比阈值必须在 0-100 之间
## check 标签固定为 "redis::used_memory_pct"
# [partials.used_memory_pct]
# warn_ge = 80
# critical_ge = 90

## 每周期被拒绝连接数检测（两个阈值都为 0 则关闭）
## 注意：这是采集周期内 delta，不是 Redis 启动以来累计值
## 指标来自 INFO stats 的 rejected_connections
## check 标签固定为 "redis::rejected_connections"
# [partials.rejected_connections]
# warn_ge = 1
# critical_ge = 10

## 已连接副本数下限检测（两个阈值都为 0 则关闭）
## 适用于 master，指标来自 INFO replication 的 connected_slaves
## check 标签固定为 "redis::connected_slaves"
# [partials.connected_slaves]
# warn_lt = 2
# critical_lt = 1

## 每周期淘汰键数量检测（两个阈值都为 0 则关闭）
## 注意：这是采集周期内 delta，不是 Redis 启动以来累计值
## check 标签固定为 "redis::evicted_keys"
# [partials.evicted_keys]
# warn_ge = 1
# critical_ge = 10

## 每周期过期键数量检测（两个阈值都为 0 则关闭）
## 注意：这是采集周期内 delta，不是 Redis 启动以来累计值
## check 标签固定为 "redis::expired_keys"
# [partials.expired_keys]
# warn_ge = 100
# critical_ge = 1000

## 瞬时 QPS 检测（两个阈值都为 0 则关闭）
## 指标来自 INFO stats 的 instantaneous_ops_per_sec
## check 标签固定为 "redis::instantaneous_ops_per_sec"
# [partials.instantaneous_ops_per_sec]
# warn_ge = 5000
# critical_ge = 20000

## 主从链路状态检测（expect 为空则关闭）
## 适用于 replica 节点，期望值通常为 up
## check 标签固定为 "redis::master_link_status"
# [partials.master_link_status]
# expect = "up"
# severity = "Warning"

## 持久化状态检测（enabled = true 时启用）
## 检查 loading / rdb_last_bgsave_status / aof_last_write_status
## check 标签固定为 "redis::persistence"
# [partials.persistence]
# enabled = true
# severity = "Critical"

## Redis Cluster 状态检测
## 默认行为：
## - mode=auto 且目标是 cluster 节点时，自动启用
## - mode=standalone 时自动跳过
## 这是低成本、低误报的硬故障检测，建议保持默认开启
## check 标签固定为 "redis::cluster_state"
# [partials.cluster_state]
# disabled = false
# severity = "Critical"

## Redis Cluster 拓扑硬故障检测
## 默认行为：
## - mode=auto 且目标是 cluster 节点时，自动启用
## - 只检查保守的硬故障：fail/pfail 节点、slot 缺失、cluster_slots_fail > 0
## - 不默认检查“master 是否有 replica”“负载是否均衡”这类依赖业务拓扑的策略
## 这个检查会额外执行一次 CLUSTER NODES，仍然是轻量命令，但比 cluster_state 略重
## check 标签固定为 "redis::cluster_topology"
# [partials.cluster_topology]
# disabled = false


[[instances]]
targets = [
#    "127.0.0.1",
]

partial = "default"

## 采集间隔
# interval = "30s"

## 追加标签（可选）
# labels = { env="production", team="middleware" }

## 如果这个实例明确不是 Cluster，可以显式写 mode = "standalone"
## 这样 agent 不会额外做 cluster 探测，最省开销
# mode = "auto"

## 可选：给该实例所属的 Cluster 打标签
# cluster_name = "prod-cache"

[instances.alerting]
for_duration = 0
repeat_interval = "5m"
repeat_number = 3
# disabled = false
# disable_recovery_notification = false

## AI 智能诊断（生效前提：config.toml 中已配置 [ai]）
## Redis 有多种深度诊断工具（slowlog、cluster info、内存分析、连接状态等）
## 注意：重操作只在诊断时触发，不会进入周期采集
[instances.diagnose]
enabled = true
# min_severity = "Warning"           # 最低触发级别: Warning(默认) / Critical
# timeout = "120s"                   # 单次诊断超时
# cooldown = "10m"                   # 同目标诊断冷却时间
