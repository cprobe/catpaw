services:
  redis-cluster-node-1:
    image: redis:7.2-alpine
    container_name: catpaw-redis-cluster-node-1
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "7000"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --dir
      - /data
      - --requirepass
      - catpaw-test
      - --masterauth
      - catpaw-test
    ports:
      - "7000:7000"
    volumes:
      - redis-cluster-node-1-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7000", "-a", "catpaw-test", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis-cluster-node-2:
