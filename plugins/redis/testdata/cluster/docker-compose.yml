  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: catpaw-redis-cluster-init
    depends_on:
      redis-cluster-node-1:
        condition: service_healthy
      redis-cluster-node-2:
        condition: service_healthy
      redis-cluster-node-3:
        condition: service_healthy
      redis-cluster-node-4:
        condition: service_healthy
      redis-cluster-node-5:
        condition: service_healthy
      redis-cluster-node-6:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo "yes" |
        redis-cli --cluster create
        redis-cluster-node-1:7000
        redis-cluster-node-2:7001
        redis-cluster-node-3:7002
        redis-cluster-node-4:7003
        redis-cluster-node-5:7004
        redis-cluster-node-6:7005
        --cluster-replicas 1
        -a catpaw-test;
        tail -f /dev/null

  redis-cluster-loadgen:
    image: redis:7.2-alpine
    container_name: catpaw-redis-cluster-loadgen
    profiles: ["tools"]
    depends_on:
      redis-cluster-init:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo "Cluster load generator is idle.";
        echo "Examples:";
        echo "  docker compose -f docker-compose.cluster.yml exec redis-cluster-loadgen redis-cli -c -h redis-cluster-node-1 -p 7000 -a catpaw-test set cart:1 payload";
        echo "  docker compose -f docker-compose.cluster.yml exec redis-cluster-loadgen redis-benchmark -c 20 -n 5000 -h redis-cluster-node-1 -p 7000 -a catpaw-test -t set,get";
        tail -f /dev/null

volumes:
  redis-cluster-node-1-data:
  redis-cluster-node-2-data:
  redis-cluster-node-3-data:
  redis-cluster-node-4-data:
  redis-cluster-node-5-data:
  redis-cluster-node-6-data:
