services:
  redis-master:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-master
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "6379"
      - --requirepass
      - catpaw-test
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-sentinel-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "catpaw-test", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis-replica-1:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-replica-1
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "6379"
      - --requirepass
      - catpaw-test
      - --masterauth
      - catpaw-test
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
    ports:
      - "6380:6379"
    volumes:
      - redis-sentinel-replica-1-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "catpaw-test", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis-replica-2:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-replica-2
    depends_on:
      redis-master:
        condition: service_healthy
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --port
      - "6379"
      - --requirepass
      - catpaw-test
      - --masterauth
      - catpaw-test
      - --replicaof
      - redis-master
      - "6379"
      - --appendonly
      - "yes"
    ports:
      - "6381:6379"
    volumes:
      - redis-sentinel-replica-2-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "catpaw-test", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-1:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-1
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel-base.conf:/etc/redis/sentinel-base.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-2:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-2
    depends_on:
      sentinel-1:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    ports:
      - "26380:26379"
    volumes:
      - ./sentinel-base.conf:/etc/redis/sentinel-base.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-3:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-3
    depends_on:
      sentinel-1:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - cp /etc/redis/sentinel-base.conf /tmp/sentinel.conf && redis-server /tmp/sentinel.conf --sentinel
    ports:
      - "26381:26379"
    volumes:
      - ./sentinel-base.conf:/etc/redis/sentinel-base.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  sentinel-tools:
    image: redis:7.2-alpine
    container_name: catpaw-redis-sentinel-tools
    profiles: ["tools"]
    depends_on:
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
      sentinel-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        echo "Sentinel tools container is idle.";
        echo "Examples:";
        echo "  docker compose exec sentinel-tools redis-cli -h sentinel-1 -p 26379 SENTINEL masters";
        echo "  docker compose exec sentinel-tools redis-cli -h sentinel-1 -p 26379 SENTINEL ckquorum mymaster";
        echo "  docker compose exec sentinel-tools redis-cli -h redis-master -a catpaw-test shutdown nosave";
        tail -f /dev/null

volumes:
  redis-sentinel-master-data:
  redis-sentinel-replica-1-data:
  redis-sentinel-replica-2-data:
